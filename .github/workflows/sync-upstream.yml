name: Sync fork with upstream

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Sync upstream
        run: gh repo sync ${{ github.repository }} --source papermark/papermark
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
